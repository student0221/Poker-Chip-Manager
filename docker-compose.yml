version: '3.8'

services:
  poker-chip-manager:
    build: .
    container_name: poker-chip-manager
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/settings"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
